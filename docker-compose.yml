services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app
      # challenge_data.py resolves CHALLENGES_DIR as a sibling of backend/
      # inside the container filesystem (see backend/Dockerfile) — the
      # ./backend:/app bind mount above doesn't bring this along on its own.
      - ./challenges:/challenges:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
